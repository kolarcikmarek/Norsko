<title>Nórsko 2026</title>
<style>
:root{--navy:#16324f;--blue:#1d5d8f;--sky:#2e7da6;--ice:#eaf3f9;--red:#c8402f;--amber:#d97a1f;
--green:#2e7d4f;--ink:#22303c;--muted:#5c6f80;--line:#d7e3ec;--bg:#f2f6f9;--card:#fff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,'Segoe UI',Roboto,sans-serif;line-height:1.45;font-size:15.5px}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
header.top{position:sticky;top:0;z-index:30;background:linear-gradient(120deg,#16324f,#1d5d8f);
color:#fff;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;justify-content:space-between;align-items:center}
header.top h1{margin:0;font-size:18px;letter-spacing:2px}
header.top .sub{font-size:11.5px;opacity:.85}
.wrap{max-width:680px;margin:0 auto;padding:12px 12px 24px}
.view{display:none}.view.active{display:block}
/* bottom nav */
nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;border-top:1px solid var(--line);
display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;background:none;border:none;padding:8px 0 6px;font-size:9.5px;color:var(--muted);cursor:pointer}
nav.tabs button .ic{display:block;font-size:18px;margin-bottom:1px}
.wpday{font-weight:800;font-size:12px;letter-spacing:1px;color:#fff;background:var(--blue);border-radius:8px;padding:4px 12px;margin:14px 2px 6px;display:inline-block}
.wprow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 11px;margin:5px 0}
.wpic{font-size:20px;flex:none;width:26px;text-align:center}
.wptx{flex:1;min-width:0}
.wpnm{font-size:14px;color:var(--navy);font-weight:600;line-height:1.25}
.wpalt{font-size:11.5px;color:var(--muted)}
.wpalt a{color:var(--blue);text-decoration:none;font-weight:700}
.wpw{flex:none;text-align:right;font-size:13px;white-space:nowrap;min-width:78px}
.wprow.past,.wpday.past{opacity:.42}
.yrbtn{flex:none;display:flex;align-items:center;gap:2px;text-decoration:none;background:linear-gradient(135deg,#1f7fc4,#0c5d97);color:#fff;border-radius:9px;padding:6px 9px;margin-left:4px;box-shadow:0 1px 3px rgba(12,93,151,.35)}
.yrbtn .yrlogo{font-weight:800;font-size:14px;letter-spacing:.5px;font-style:italic}
.yrbtn .yrsun{font-size:11px;margin-top:-6px;margin-left:-1px}
.yrbtn:active{transform:scale(.95)}
nav.tabs button.on{color:var(--blue);font-weight:700}
/* day list */
.todaycard{border-radius:16px;overflow:hidden;position:relative;margin-bottom:14px;box-shadow:0 4px 14px rgba(22,50,79,.25);cursor:pointer}
.todaycard img{width:100%;height:190px;object-fit:cover;display:block}
.todaycard .ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(10,25,40,.85));
display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#fff}
.todaycard .badge{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-weight:800;
font-size:12px;padding:4px 12px;border-radius:999px;letter-spacing:1px}
.todaycard h3{margin:0;font-size:19px}.todaycard .d{font-size:12.5px;opacity:.9}
.stagehead{margin:18px 2px 8px;font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.dayrow{display:flex;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;
margin-bottom:8px;overflow:hidden;cursor:pointer;align-items:stretch}
.dayrow.past{opacity:.55}
.dayrow .thumb{width:86px;min-height:76px;background:var(--ice) center/cover no-repeat;flex:none}
.dayrow .tx{padding:9px 10px 9px 0;flex:1;min-width:0}
.dayrow .dt{font-size:11.5px;color:var(--muted);font-weight:700}
.dayrow .dt .tick{color:var(--green)}
.dayrow h4{margin:1px 0 3px;font-size:14.5px;color:var(--navy)}
.dayrow .meta{font-size:11.5px;color:var(--muted)}
.dayrow .meta b{color:var(--red)}
/* detail overlay */
#detail{position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
#detail.open{display:block}
.hero{position:relative}
.hero img{width:100%;height:230px;object-fit:cover;display:block;background:var(--ice)}
.hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,25,40,.45),transparent 35%,rgba(10,25,40,.88));
display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#fff;pointer-events:none}
.hero h2{margin:0;font-size:21px;line-height:1.2}
.hero .d{font-size:13px;opacity:.95}
.hero .back{position:absolute;top:calc(10px + env(safe-area-inset-top));left:10px;background:rgba(0,0,0,.55);
color:#fff;border:none;border-radius:999px;padding:9px 16px;font-size:15px;cursor:pointer;z-index:5;pointer-events:auto}
.dbody{max-width:680px;margin:0 auto;padding:12px 14px 90px}
.pill{display:inline-block;background:var(--navy);color:#fff;font-size:12px;border-radius:8px;padding:3px 10px;margin:2px 6px 8px 0}
.pill.green{background:var(--green)}.pill.red{background:var(--red)}
.sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:10px 0}
.sec h5{margin:0 0 8px;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.plan li{margin:0 0 2px;list-style:none;position:relative;padding:7px 4px 7px 34px;border-radius:8px;cursor:pointer}
.plan{margin:0;padding:0}
.plan li::before{content:'○';position:absolute;left:8px;top:6px;color:var(--blue);font-size:15px}
.plan li.done{opacity:.45;text-decoration:line-through}
.plan li.done::before{content:'✓';color:var(--green);font-weight:800}
.box{border-left:4px solid;border-radius:0 10px 10px 0;padding:9px 12px;margin:10px 0;font-size:14px;background:#fff}
.box.book{border-color:var(--green);background:#f0f7f1}
.box.sleep{border-color:#7b6cb1;background:#f4f2fa}
.box.tip{border-color:var(--amber);background:#fdf8ec}
.box.late{border-color:var(--red);background:#fdf0ed}
.navbtns a{display:block;background:var(--blue);color:#fff;text-decoration:none;text-align:center;
border-radius:10px;padding:11px;margin:7px 0;font-weight:600;font-size:14.5px}
.navbtns a.sec2{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.gallery img{height:130px;border-radius:10px;flex:none}
.prevnext{display:flex;gap:10px;margin-top:14px}
.prevnext button{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--blue);background:#fff;color:var(--blue);font-weight:700;font-size:14px;cursor:pointer}
.prevnext button:disabled{opacity:.35}
/* map */
.mapbox{background:#dcebf5;border:1px solid var(--line);border-radius:14px;padding:6px}
.mapbox svg{width:100%;height:auto;display:block}
.mappin{cursor:pointer}

.tix{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:10px 0}
.tix .when{font-size:12px;font-weight:800;color:var(--red)}
.tix h4{margin:2px 0 4px;font-size:15.5px;color:var(--navy)}
.tix .ref{font-size:12.5px;color:var(--muted)}
.tix .note{font-size:13.5px;margin-top:6px}
.pdfbtn{display:inline-block;margin-top:9px;background:#fff;border:1.5px solid var(--blue);color:var(--blue);text-decoration:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:13.5px}
.pdfbtn:active{background:var(--ice)}
.infocard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px 16px 12px;margin:10px 0}
.infocard h3{font-size:15.5px;color:var(--navy);margin:12px 0 6px}
.infocard ul{margin:4px 0;padding-left:18px;font-size:14px}
.infocard li{margin:4px 0}
.contact{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:9px 2px;font-size:14px}
.contact:last-child{border-bottom:none}
.contact a{color:var(--blue);text-decoration:none;font-weight:700;white-space:nowrap;margin-left:10px}
.anchor{display:flex;gap:10px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--red);
border-radius:10px;padding:10px 12px;margin:8px 0;font-size:14px}
.anchor .ic{font-size:20px}
.anchor b.t{color:var(--red)}
.cl{list-style:none;margin:0;padding:0}
.cl li{padding:8px 4px 8px 34px;position:relative;cursor:pointer;border-bottom:1px solid var(--line);font-size:14px}
.cl li::before{content:'○';position:absolute;left:8px;color:var(--blue)}
.cl li.done{opacity:.45;text-decoration:line-through}
.cl li.hdr{font-weight:800;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:default;padding-left:4px;margin-top:10px;border-bottom:none}
.cl li.hdr::before{content:""}
.cl li.done::before{content:'✓';color:var(--green);font-weight:800}
h2.vt{font-size:19px;color:var(--navy);margin:8px 2px 12px}
.lead{font-size:13.5px;color:var(--muted);margin:-6px 2px 12px}
a{color:var(--blue)}
.cnt{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px}

let wwxCache=LS("wwx"); let WWX=(wwxCache&&wwxCache.d)?wwxCache.d:{};
function offIso(iso){const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(iso+"T00:00:00")-t)/86400000);}

function wxIcon(c){
  if(c===0)return"☀️"; if([1,2].includes(c))return"🌤️"; if(c===3)return"☁️";
  if([45,48].includes(c))return"🌫️"; if([51,53,55,56,57].includes(c))return"🌦️";
  if([61,63,65,66,67,80,81,82].includes(c))return"🌧️";
  if([71,73,75,77,85,86].includes(c))return"🌨️";
  if([95,96,99].includes(c))return"⛈️"; return"🌡️";
}
function wxStr(i){
  const w=WX[i], off=dayOffset(i);
  if(w){ // máme predpoveď (do 16 dní)
    const tr=off>7?"~":""; // 8–16 dní = trend
    return ` · <span style="color:var(--blue);font-weight:700">${wxIcon(w.code)} ${tr}${w.tmax}°/${w.tmin}°${w.rain>=1?" 💧":""}</span>`;
  }
  const n=NORM[i]; if(!n)return"";
  return ` · <span style="color:var(--muted)">${n[2]} ~${n[0]}°/${n[1]}° <span style="font-size:10px">ø júl</span></span>`;
}

function loadWeather(){
  const lats=COORDS.map(c=>c[0]).join(","), lons=COORDS.map(c=>c[1]).join(",");
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto&forecast_days=16`;
  fetch(url).then(r=>r.json()).then(arr=>{
    if(!Array.isArray(arr))arr=[arr];
    const nw={};
    arr.forEach((loc,i)=>{
      if(!loc.daily)return; const idx=loc.daily.time.indexOf(DAYS[i].iso);
      if(idx>=0)nw[i]={code:loc.daily.weather_code[idx],tmax:Math.round(loc.daily.temperature_2m_max[idx]),tmin:Math.round(loc.daily.temperature_2m_min[idx]),rain:Math.round(loc.daily.precipitation_sum[idx]),wind:Math.round(loc.daily.wind_speed_10m_max[idx])};
    });
    WX=nw; wxTime=Date.now(); SAVE("wx",{t:wxTime,d:WX});
    renderDays(); if(cur>=0)openDay(cur);
  }).catch(()=>{});
  // waypoints
  const wla=WP.map(p=>p.la).join(","), wlo=WP.map(p=>p.lo).join(",");
  const wurl=`https://api.open-meteo.com/v1/forecast?latitude=${wla}&longitude=${wlo}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto&forecast_days=16`;
  fetch(wurl).then(r=>r.json()).then(arr=>{
    if(!Array.isArray(arr))arr=[arr];
    const nw={};
    arr.forEach((loc,i)=>{ if(!loc.daily)return; const idx=loc.daily.time.indexOf(WP[i].iso);
      if(idx>=0)nw[i]={code:loc.daily.weather_code[idx],tmax:Math.round(loc.daily.temperature_2m_max[idx]),tmin:Math.round(loc.daily.temperature_2m_min[idx]),rain:Math.round(loc.daily.precipitation_sum[idx])};});
    WWX=nw; SAVE("wwx",{t:Date.now(),d:WWX}); renderWp();
  }).catch(()=>{});
}

function todayIdx(){

}
function daysToStart(){
  const ms=new Date("2026-07-03T08:00:00")-new Date();

  h+=`</ul></div>`;

  if(d.nav&&d.nav.length){h+=`<div class="navbtns">`;d.nav.forEach((n,j)=>{h+=`<a href="${n.u}" target="_blank" class="${j?"sec2":""}">📍 ${n.t}</a>`;});h+=`</div>`;}
  if(YR[i])h+=`<div class="navbtns"><a href="https://www.yr.no/en/search?q=${encodeURIComponent(YR[i])}" target="_blank" class="sec2">⛅ Yr predpoveď: ${YR[i]}</a></div>`;
  if(d.photos&&d.photos.length){h+=`<div class="sec"><h5>Viac fotiek</h5><div class="gallery">`;d.photos.forEach(p=>h+=`<img src="${p}" loading="lazy">`);h+=`</div></div>`;}
  h+=`<div class="prevnext">
    <button ${i===0?"disabled":""} onclick="openDay(${i-1})">‹ ${i>0?DAYS[i-1].d:""}</button>

  </div></div>`;
  const el=document.getElementById("detail");
  el.innerHTML=h; el.classList.add("open"); el.scrollTop=0;
}
